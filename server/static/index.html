<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Web_app API test</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
    <script src="prod.js"></script>
    <script src="categ.js"></script>
    <script src="predpr.js"></script>
    <script src="sklad.js"></script>
    <script src="order.js"></script>
    <script src="spec.js"></script>
</head>
<body>
    <h2>Prod <button onclick="get_prod()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="prod_id" disabled size="3" title="id">
        <input type="text" id="prod_name" title="Product name">
        <input type="number" id="prod_price" title="Product price">
        <select id="prod_categ_sel">
            <option value="0">Выберете категорию</option>
        </select>
        <button onclick="ins_upd_prod()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="prod_div"></div>
    <h2>Categ <button onclick="get_categ()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="categ_id" disabled size="3" title="id">
        <input type="text" id="categ_name" title="Category name">
        <button onclick="ins_upd_categ()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="categ_div"></div>
    <h2>Predpr <button onclick="get_predpr()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="predpr_id" disabled size="3" title="id">
        <input type="text" id="predpr_name" title="Predpr name">
        <input type="text" id="predpr_address" title="Predpr address">
        <button onclick="ins_upd_predpr()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="predpr_div"></div>
    <h2>Sklad <button onclick="get_sklad()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="sklad_id" disabled size="3" title="id">
        <select id="sklad_prod_sel">
            <option value="0">Выберете продукцию</option>
        </select>
        <input type="number" id="sklad_kol" title="Product KOL">
        <button onclick="ins_upd_sklad()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="sklad_div"></div>
    <h2>Order <button onclick="get_order()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="order_id" disabled size="3" title="id">
        <input type="text" id="order_name" title="Order name">
        <select id="order_predpr_sel">
            <option value="0">Выберете предприятие</option>
        </select>
        <button onclick="ins_upd_order()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="order_div"></div>
    <h2>Spec <button onclick="get_spec()">Get</button></h2>
    <div style="display: inline-block;">
        <input id="spec_id" disabled size="3" title="id">
        <select id="spec_order_sel">
            <option value="0">Выберете счет</option>
        </select>
        <select id="spec_prod_sel">
            <option value="0">Выберете продукцию</option>
        </select>
        <input type="number" id="spec_kol" title="Spec KOL">
        <button onclick="ins_upd_spec()" title="Insert if empty id, else Update">Insert-Update</button>
    </div>
    <div id="spec_div"></div>
</body>
<html>
